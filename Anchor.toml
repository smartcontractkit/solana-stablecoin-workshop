[toolchain]
anchor_version = "0.31.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
oracle = "7T1DsCBj5puBiTUgDZb3Un28tsmxBCHR1xXbd7ggJfYd"  # Enhanced oracle with price storage
stablecoin = "11111111111111111111111111111111"  # Placeholder - will be updated after deployment

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
